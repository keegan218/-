<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>前端新手的逆袭之路</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        background: #f7f8fa;
        color: #1f2937;
      }
      .container {
        max-width: 760px;
        margin: 48px auto;
        padding: 0 20px;
      }
      .post {
        background: #fff;
        border-radius: 12px;
        padding: 28px;
        box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      }
      h1 {
        margin-top: 0;
        font-size: 30px;
      }
      .meta {
        color: #6b7280;
        font-size: 14px;
        margin-bottom: 20px;
      }
      p {
        line-height: 1.8;
        margin: 0 0 16px;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <article class="post">
        <h1>前端新手的逆袭之路</h1>
        <p class="meta">发布于 2026-05-12 · 分类：博客</p>
        <p>欢迎来到我的第一个博客页面。这里会记录我学习前端开发的实践、踩坑和成长。</p>
        <p>从 HTML、CSS 到 JavaScript，我会用最简单直接的方式，把每一次进步都分享出来。</p>
      </article>
    </main>
  </body>
</html>
